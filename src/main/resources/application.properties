quarkus.application.name=quarkus-proxy
quarkus.http.port=8080

quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/quarkus_proxy
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres

quarkus.hibernate-orm.database.generation=validate

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/quarkus_proxy_test
%test.quarkus.flyway.clean-disabled=false
